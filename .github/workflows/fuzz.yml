name: Fuzz Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *' # Run daily

jobs:
  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install nightly Rust
      uses: dtolnay/rust-toolchain@nightly

    - name: Install cargo-fuzz
      run: cargo install cargo-fuzz

    - name: Fuzz GGUF Reader
      run: cargo +nightly fuzz run gguf_reader -- -max_total_time=300
